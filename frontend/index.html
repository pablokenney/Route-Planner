<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Route Planner</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root { --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --line:#334155;
            --text:#e2e8f0; --muted:#94a3b8; --accent:#3b82f6; --accent2:#60a5fa; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, sans-serif; color:var(--text);
           height:100vh; display:flex; flex-direction:column; background:var(--bg); }
    header { background:var(--panel); padding:10px 16px; display:flex; gap:14px; align-items:center;
             border-bottom:1px solid var(--line); flex-wrap:wrap; }
    header h1 { font-size:16px; margin:0; font-weight:600; letter-spacing:.2px; }
    header .spacer { flex:1; }
    .addr { display:flex; gap:6px; align-items:center; }
    input[type=text], input[type=number] { background:var(--panel2); border:1px solid var(--line);
            color:var(--text); border-radius:6px; padding:6px 9px; font-size:13px; }
    input[type=text] { width:260px; }
    input[type=number] { width:72px; }
    button { background:var(--accent); color:#fff; border:none; border-radius:6px;
             padding:6px 12px; font-size:13px; cursor:pointer; font-weight:500; }
    button.ghost { background:var(--panel2); border:1px solid var(--line); color:var(--text); }
    button:hover { filter:brightness(1.08); }
    .main { flex:1; display:flex; min-height:0; }
    .sidebar { width:340px; background:var(--panel); border-right:1px solid var(--line);
               display:flex; flex-direction:column; min-height:0; }
    .controls { padding:14px 16px; border-bottom:1px solid var(--line); }
    .presets { display:flex; gap:6px; margin:8px 0; }
    .presets button { flex:1; background:var(--panel2); border:1px solid var(--line); color:var(--text); }
    .presets button.active { background:var(--accent); border-color:var(--accent); color:#fff; }
    .row { display:flex; gap:8px; align-items:center; margin-top:8px; }
    .label { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); }
    .starts { display:flex; flex-wrap:wrap; gap:6px; margin:8px 0 4px; min-height:8px; }
    .starts .chip { display:flex; align-items:center; gap:5px; background:var(--panel2);
                    border:1px solid var(--line); border-radius:14px; padding:3px 6px 3px 10px;
                    font-size:12px; cursor:pointer; }
    .starts .chip:hover { border-color:var(--accent2); }
    .starts .chip .x { color:var(--muted); font-weight:700; padding:0 3px; border-radius:8px; }
    .starts .chip .x:hover { color:#f87171; }
    .starts .empty { font-size:12px; color:var(--muted); }
    #status { padding:8px 16px; font-size:12px; color:var(--muted); min-height:32px; }
    #status.warn { color:#fbbf24; }
    .cards { flex:1; overflow-y:auto; padding:6px 12px 14px; }
    .card { background:var(--panel2); border:1px solid var(--line); border-radius:9px;
            padding:10px 12px; margin:8px 0; cursor:pointer; transition:border-color .12s, background .12s; }
    .card:hover { border-color:var(--accent2); }
    .card.sel { border-color:var(--accent); background:#1d3a6b; box-shadow:0 0 0 1px var(--accent); }
    .card .top { display:flex; align-items:baseline; gap:8px; }
    .card .rank { font-size:11px; color:var(--muted); background:var(--bg); border-radius:10px;
                  padding:1px 7px; }
    .card .dist { font-size:20px; font-weight:700; }
    .card .gain { font-size:12px; color:var(--muted); margin-left:auto; }
    .mixbar { display:flex; height:7px; border-radius:4px; overflow:hidden; margin:8px 0 5px; }
    .mixbar span { height:100%; }
    .mixtext { font-size:11px; color:var(--muted); line-height:1.4; }
    .badges { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
    .badge { font-size:10px; padding:2px 6px; border-radius:10px; background:#1e293b; color:var(--muted); }
    .badge.ob { background:#3b2f1e; color:#fbbf24; }
    .badge.loop { background:#1e293b; color:#94a3b8; }
    .badge.seg { background:#1e2f24; color:#34d399; }
    .stage { flex:1; display:flex; flex-direction:column; min-width:0; }
    #map { flex:1; }
    .chartwrap { height:170px; background:var(--panel); border-top:1px solid var(--line);
                 padding:8px 12px 10px; }
    .chartwrap .chdr { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); }
    canvas#elev { width:100%; height:128px; }
    a.dl { text-decoration:none; }
    .dirwrap { background:var(--panel); border-top:1px solid var(--line); padding:8px 12px;
               max-height:200px; overflow-y:auto; }
    .dirwrap .chdr { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); }
    .dirtoggle { cursor:pointer; color:#60a5fa; }
    .dirlist { margin:8px 0 0; padding-left:22px; font-size:12px; color:#cbd5e1; }
    .dirlist li { margin:3px 0; }
    .dirlist .turn-d { color:var(--muted); font-size:11px; margin-left:6px; }
  </style>
</head>
<body>
  <header>
    <h1>🏃 Route Planner</h1>
    <div class="addr">
      <input id="addr" type="text" placeholder="Start address (defaults to home)" />
      <button id="setStart" class="ghost">Set start</button>
      <button id="useHome" class="ghost">Home</button>
    </div>
    <div class="spacer"></div>
    <span id="startName" style="font-size:12px;color:var(--muted)"></span>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div class="controls">
        <div class="presets" id="mode">
          <button data-mode="loops" class="active">Loops</button>
          <button data-mode="milestone" title="Loops through points you require">Milestone</button>
        </div>

        <!-- Milestone-only: required waypoints -->
        <div id="msBlock" style="display:none">
          <div class="label" style="margin-top:14px">Required waypoints</div>
          <div id="msHint" class="mixtext" style="margin:6px 0">
            Click the map to drop a pin, or type an address below. Every loop will pass through each point.
          </div>
          <div id="msWaypoints" class="starts"></div>
          <div class="row">
            <input id="msAddr" type="text" placeholder="Add a waypoint by address" style="flex:1;width:auto" />
            <button id="msAddAddr" class="ghost">Add</button>
          </div>
          <div class="presets" id="msPad" style="margin-top:10px">
            <button data-pad="1" class="active" title="Pad out to the target distance">Pad to target</button>
            <button data-pad="0" title="Just route through the points, report the distance">Exact (derived)</button>
          </div>
          <div class="presets" id="msShape" style="margin-top:8px">
            <button data-ob="0" class="active" title="Loop: return by a different route">◯ Loop</button>
            <button data-ob="1" title="Out &amp; back: run out through the points and retrace the same path home">↩ Out &amp; back</button>
          </div>
        </div>

        <div class="label" style="margin-top:14px">Distance</div>
        <div class="presets" id="presets">
          <button data-mi="3">3 mi</button>
          <button data-mi="5">5 mi</button>
          <button data-mi="8">8 mi</button>
          <button data-mi="11">11 mi</button>
        </div>
        <div class="row">
          <input id="miles" type="number" value="5" step="0.1" min="0.6" max="15" />
          <span class="label">miles</span>
          <button id="go" style="margin-left:auto">Generate loops</button>
        </div>

        <div class="label" style="margin-top:14px">Surface</div>
        <div class="presets" id="surface">
          <button data-surf="any" class="active" title="No preference">Any</button>
          <button data-surf="paved" title="Prefer paved/asphalt">Paved</button>
          <button data-surf="unpaved" title="Prefer trails/unpaved">Unpaved</button>
        </div>

        <div class="label" style="margin-top:14px"><span id="savedLabel">Saved starts</span></div>
        <div id="starts" class="starts"></div>
        <div class="row">
          <input id="startNameInput" type="text" placeholder="Name this start" style="flex:1;width:auto" />
          <button id="saveStart" class="ghost">Save current</button>
        </div>
        <!-- Milestone-only: saved milestones -->
        <div id="msSavedBlock" style="display:none">
          <div class="label" style="margin-top:14px">Saved milestones</div>
          <div id="msSaved" class="starts"></div>
          <div class="row">
            <input id="msNameInput" type="text" placeholder="Name this milestone" style="flex:1;width:auto" />
            <button id="msSave" class="ghost">Save current</button>
          </div>
        </div>
      </div>
      <div id="status">Pick a distance and generate.</div>
      <div class="cards" id="cards"></div>
    </aside>

    <div class="stage">
      <div id="map"></div>
      <div class="chartwrap">
        <div class="chdr"><span id="chartTitle">Elevation profile</span><span id="chartGain"></span></div>
        <canvas id="elev"></canvas>
      </div>
      <div class="dirwrap" id="dirwrap">
        <div class="chdr">
          <span id="dirTitle">Directions</span>
          <span id="dirToggle" class="dirtoggle">show</span>
        </div>
        <ol id="dirlist" class="dirlist" style="display:none"></ol>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
  const HOME = [40.195016, -77.199929];
  const M2FT = 3.28084, M2MI = 1/1609.344;
  const CLASS_COLOR = { residential:'#60a5fa', footway:'#34d399', path:'#34d399',
    cycleway:'#22d3ee', pedestrian:'#34d399', living_street:'#a78bfa', service:'#fbbf24',
    tertiary:'#f87171', unclassified:'#fb923c', road:'#fb923c', track:'#a3a3a3',
    steps:'#9ca3af', other:'#cbd5e1' };

  let state = { start: HOME.slice(), startName: 'Home', miles: 5, surface: 'any',
                data: null, sel: -1, layers: [], chart: null, starts: [],
                mode: 'loops', pad: true, outBack: false, turns: [],
                waypoints: [], wpMarkers: [], snapMarkers: [], milestones: [] };

  const map = L.map('map', { zoomControl: true }).setView(HOME, 14);
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',
    { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(map);
  let startMarker = L.marker(HOME, { title: 'Start' }).addTo(map);

  // Distinct icons for required (requested) vs snapped waypoint positions.
  function dot(color){ return L.divIcon({ className:'', iconSize:[16,16], iconAnchor:[8,8],
    html:`<div style="width:14px;height:14px;border-radius:50%;background:${color};
          border:2px solid #0f172a;box-shadow:0 0 0 1px ${color}"></div>` }); }
  const WP_ICON = dot('#f59e0b'), SNAP_ICON = dot('#34d399');

  function setStatus(msg, warn=false){ const s=document.getElementById('status');
    s.textContent=msg; s.className = warn ? 'warn' : ''; }

  function haversine(a,b){ const R=6371000, t=Math.PI/180;
    const dla=(b[0]-a[0])*t, dlo=(b[1]-a[1])*t;
    const h=Math.sin(dla/2)**2+Math.cos(a[0]*t)*Math.cos(b[0]*t)*Math.sin(dlo/2)**2;
    return 2*R*Math.asin(Math.sqrt(h)); }

  function mixBar(mix){
    const entries = Object.entries(mix);
    const bar = entries.map(([k,v])=>`<span style="width:${v}%;background:${CLASS_COLOR[k]||CLASS_COLOR.other}"></span>`).join('');
    const txt = entries.slice(0,3).map(([k,v])=>`${v}% ${k}`).join(' · ');
    return { bar, txt };
  }

  function badges(c){
    const b = [];
    if(c.route_type==='out_and_back')
      b.push(`<span class="badge ob">↩ out & back · ${Math.round(c.overlap_pct||0)}% retraced</span>`);
    else
      b.push('<span class="badge loop">◯ loop</span>');
    if(c.segments && c.segments.length)
      b.push(`<span class="badge seg">★ ${c.segments.length} segment${c.segments.length>1?'s':''}</span>`);
    return b.join('');
  }

  function renderCards(){
    const wrap = document.getElementById('cards'); wrap.innerHTML='';
    state.data.candidates.forEach((c,i)=>{
      const {bar,txt} = mixBar(c.road_mix_pct);
      const div = document.createElement('div');
      div.className = 'card' + (i===state.sel ? ' sel':'');
      div.innerHTML = `
        <div class="top">
          <span class="rank">#${c.rank}</span>
          <span class="dist">${c.distance_mi.toFixed(2)} mi</span>
          <span class="gain">+${Math.round(c.ascend_m*M2FT)} ft</span>
        </div>
        <div class="mixbar">${bar}</div>
        <div class="mixtext">${txt}</div>
        <div class="badges">${badges(c)}</div>`;
      div.onclick = ()=>select(i);
      div.onmouseenter = ()=>highlight(i,true);
      div.onmouseleave = ()=>highlight(i,false);
      wrap.appendChild(div);
    });
  }

  function drawAll(){
    state.layers.forEach(l=>map.removeLayer(l)); state.layers=[];
    state.data.candidates.forEach((c,i)=>{
      const ll = c.latlngs.map(p=>[p[0],p[1]]);
      const line = L.polyline(ll, { color:'#64748b', weight:3, opacity:.55 });
      line.on('click', ()=>select(i));
      line.addTo(map); state.layers.push(line);
    });
  }
  function highlight(i, on){
    if(state.layers[i] && i!==state.sel)
      state.layers[i].setStyle({ color: on?'#93c5fd':'#64748b', weight: on?4:3, opacity: on?.9:.55 });
  }
  function select(i){
    state.sel = i;
    state.layers.forEach((l,j)=>l.setStyle(j===i
      ? { color:'#2563eb', weight:5, opacity:1 } : { color:'#64748b', weight:3, opacity:.45 }));
    state.layers[i].bringToFront();
    map.fitBounds(state.layers[i].getBounds(), { padding:[40,40] });
    renderCards();
    renderChart(state.data.candidates[i]);
    const c = state.data.candidates[i];
    // A loop reproducible by round_trip seed (NOT a milestone composite or out-and-back) can
    // use the param-based GPX/directions endpoints; everything else works from geometry.
    const reproducible = state.mode!=='milestone' && c.route_type!=='out_and_back';
    const dl = document.getElementById('dlbtn');
    if(reproducible){
      dl.onclick = null;
      dl.href = `/api/gpx?distance_m=${c.gen_distance_m}&seed=${c.seed}&lat=${state.start[0]}&lon=${state.start[1]}&surface=${state.surface}`;
    } else {
      // Composites (milestone, out-and-back) can't be reproduced by a single round_trip seed,
      // so download GPX straight from the geometry we already hold.
      dl.onclick = (e)=>{ e.preventDefault(); downloadTrack(c); };
      dl.removeAttribute('href');
    }
    loadDirections(c, reproducible);
  }

  // POST geometry to /api/gpx_track and trigger a download (milestone + out-and-back composites).
  async function downloadTrack(c){
    const nm = routeName(c);
    try{
      const r = await fetch('/api/gpx_track', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ latlngs:c.latlngs, elevations:c.elevations, name:nm }) });
      if(!r.ok){ setStatus('GPX error: '+(await r.text()), true); return; }
      triggerDownload(await r.blob(), nm.toLowerCase().replace(/\s+/g,'_')+'.gpx');
    }catch(e){ setStatus('GPX error: '+e.message, true); }
  }

  function routeName(c){
    const kind = c.route_type==='out_and_back' ? 'Out-and-back'
               : (state.mode==='milestone' ? 'Milestone' : 'Loop');
    return `${kind} ${c.distance_mi.toFixed(1)}mi`;
  }
  function triggerDownload(blob, filename){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=filename;
    a.click(); URL.revokeObjectURL(url);
  }

  // Fetch + render the step-by-step turn list for the selected route. For reproducible loops
  // we ask GraphHopper for real instructions (GET /api/directions); composites use bend
  // detection from geometry (POST /api/directions_track). Either path returns the same shape.
  async function loadDirections(c, reproducible){
    const list = document.getElementById('dirlist');
    list.innerHTML = '<li class="turn-d">loading…</li>';
    try{
      let turns;
      if(reproducible){
        const u = `/api/directions?distance_m=${c.gen_distance_m}&seed=${c.seed}&lat=${state.start[0]}&lon=${state.start[1]}&surface=${state.surface}`;
        const r = await fetch(u);
        turns = r.ok ? (await r.json()).turns : null;
      } else {
        const r = await fetch('/api/directions_track', { method:'POST',
          headers:{'Content-Type':'application/json'}, body: JSON.stringify({ latlngs:c.latlngs }) });
        turns = r.ok ? (await r.json()).turns : null;
      }
      state.turns = turns || [];
      renderDirections(state.turns);
    }catch(e){ list.innerHTML = `<li class="turn-d">directions unavailable</li>`; state.turns=[]; }
  }

  function turnIcon(sign){
    if(sign<=-2) return '↰'; if(sign===-1) return '↖';
    if(sign===1) return '↗'; if(sign>=2 && sign<4) return '↱';
    if(sign===4) return '🏁'; return '↑';
  }
  function renderDirections(turns){
    const list = document.getElementById('dirlist');
    if(!turns || !turns.length){ list.innerHTML = '<li class="turn-d">no turns</li>'; return; }
    list.innerHTML = turns.map(t=>{
      const mi = (t.cumulative_m*M2MI).toFixed(2);
      return `<li>${turnIcon(t.sign)} ${t.text}<span class="turn-d">${mi} mi</span></li>`;
    }).join('');
  }

  // Download a TCX course (with distance-tagged turn cues) for Apple Watch turn-by-turn.
  async function downloadTcx(){
    if(state.sel<0 || !state.data || !state.data.candidates[state.sel]) return;
    const c = state.data.candidates[state.sel];
    const nm = routeName(c);
    try{
      const r = await fetch('/api/tcx_track', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ latlngs:c.latlngs, elevations:c.elevations,
          turns: state.turns||[], name:nm }) });
      if(!r.ok){ setStatus('TCX error: '+(await r.text()), true); return; }
      triggerDownload(await r.blob(), nm.toLowerCase().replace(/\s+/g,'_')+'.tcx');
    }catch(e){ setStatus('TCX error: '+e.message, true); }
  }

  function renderChart(c){
    // cumulative distance (mi) vs elevation (ft)
    const xs=[], ys=[]; let cum=0;
    for(let i=0;i<c.latlngs.length;i++){
      if(i>0) cum += haversine(c.latlngs[i-1], c.latlngs[i]);
      xs.push(+(cum*M2MI).toFixed(3));
      ys.push(c.elevations[i]!=null ? +(c.elevations[i]*M2FT).toFixed(0) : null);
    }
    document.getElementById('chartGain').textContent =
      `${c.distance_mi.toFixed(2)} mi · +${Math.round(c.ascend_m*M2FT)} ft gain / −${Math.round(c.descend_m*M2FT)} ft`;
    const cfg = {
      type:'line',
      data:{ labels:xs, datasets:[{ data:ys, borderColor:'#3b82f6',
        backgroundColor:'rgba(59,130,246,.18)', fill:true, pointRadius:0, borderWidth:2, tension:.3 }]},
      options:{ responsive:true, maintainAspectRatio:false, animation:false,
        scales:{ x:{ type:'linear', title:{display:true,text:'miles',color:'#94a3b8'},
                     ticks:{color:'#94a3b8',maxTicksLimit:8}, grid:{color:'#1e293b'} },
                 y:{ title:{display:true,text:'ft',color:'#94a3b8'},
                     ticks:{color:'#94a3b8'}, grid:{color:'#1e293b'} } },
        plugins:{ legend:{display:false},
          tooltip:{ callbacks:{ title:i=>`${i[0].label} mi`, label:i=>`${i.raw} ft` } } } }
    };
    if(state.chart){ state.chart.data=cfg.data; state.chart.options=cfg.options; state.chart.update(); }
    else state.chart = new Chart(document.getElementById('elev'), cfg);
  }

  function generate(){ return state.mode==='milestone' ? generateMilestone() : generateLoops(); }

  async function generateLoops(){
    setStatus('Generating loops…');
    document.getElementById('cards').innerHTML='';
    const mi = parseFloat(document.getElementById('miles').value);
    state.miles = mi;
    try{
      const u = `/api/routes?miles=${mi}&lat=${state.start[0]}&lon=${state.start[1]}&surface=${state.surface}`;
      const res = await fetch(u);
      if(!res.ok){ setStatus('Error: '+(await res.text()), true); return; }
      const d = await res.json(); state.data = d; state.sel=-1;
      const surfNote = d.surface && d.surface!=='any' ? ` · ${d.surface}` : '';
      if(d.shortfall) setStatus(`⚠ ${d.message} — showing closest available.`, true);
      else setStatus(`${d.candidates.length} loop${d.candidates.length>1?'s':''} near ${mi} mi (within ±${Math.round(d.display_band*100)}%)${surfNote}.`);
      drawAll(); renderCards();
      if(d.candidates.length) select(0);
    }catch(e){ setStatus('Error: '+e.message, true); }
  }

  async function generateMilestone(){
    if(!state.waypoints.length){ setStatus('Drop or type at least one required waypoint.', true); return; }
    const mi = parseFloat(document.getElementById('miles').value); state.miles = mi;
    const shape = state.outBack ? 'out-and-back route' : 'loop';
    setStatus(state.pad ? `Building ${shape}s through ${state.waypoints.length} point(s) near ${mi} mi…`
                        : `Routing through ${state.waypoints.length} point(s)…`);
    document.getElementById('cards').innerHTML='';
    const body = { waypoints: state.waypoints.map(w=>({lat:w[0],lon:w[1]})),
      lat: state.start[0], lon: state.start[1], surface: state.surface,
      pad: state.pad, out_back: state.outBack };
    if(state.pad) body.miles = mi;
    try{
      const res = await fetch('/api/milestone', { method:'POST',
        headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      if(!res.ok){ setStatus('Error: '+(await res.text()), true); return; }
      const d = await res.json(); state.data = d; state.sel=-1;
      drawSnapped(d.snapped_waypoints||[]);
      if(d.over_spine){ setStatus('⚠ '+d.message, true); document.getElementById('cards').innerHTML=''; return; }
      const methodNote = { filter:'filtered round-trips', decompose:'built (out-and-back + loop)',
        derived:'exact route through points', out_and_back:'out-and-back retrace' }[d.method] || d.method;
      const noun = state.outBack ? 'route' : 'loop';
      const snapNote = (d.snapped_waypoints||[]).some(s=>s.moved) ? ' · some pins snapped to nearest runnable point' : '';
      if(d.shortfall) setStatus(`⚠ ${d.message||'closest available'} — ${methodNote}.${snapNote}`, true);
      else setStatus(`${d.candidates.length} ${noun}${d.candidates.length!==1?'s':''} through all points · ${methodNote}${snapNote}.`);
      drawAll(); renderCards();
      if(d.candidates.length) select(0);
    }catch(e){ setStatus('Error: '+e.message, true); }
  }

  async function setStart(){
    const q = document.getElementById('addr').value.trim();
    if(!q){ return; }
    setStatus('Looking up address…');
    try{
      const res = await fetch(`/api/geocode?q=${encodeURIComponent(q)}`);
      if(!res.ok){ setStatus('Address not found: '+(await res.text()), true); return; }
      const g = await res.json();
      state.start=[g.lat,g.lon]; state.startName=g.display_name;
      document.getElementById('startName').textContent = '📍 '+g.display_name.split(',').slice(0,2).join(',');
      startMarker.setLatLng(state.start); map.setView(state.start, 14);
      generate();
    }catch(e){ setStatus('Geocoding error: '+e.message, true); }
  }
  function useHome(){
    state.start=HOME.slice(); state.startName='Home';
    document.getElementById('addr').value='';
    document.getElementById('startName').textContent='📍 Home (Carlisle, PA)';
    startMarker.setLatLng(HOME); map.setView(HOME,14); generate();
  }

  // ---- saved start points (server-side starts.json) ----
  function applyStart(lat, lon, name){
    state.start=[lat,lon]; state.startName=name;
    document.getElementById('startName').textContent = '📍 '+name;
    startMarker.setLatLng(state.start); map.setView(state.start, 14);
    generate();
  }
  function renderStarts(){
    const wrap = document.getElementById('starts'); wrap.innerHTML='';
    if(!state.starts.length){ wrap.innerHTML='<span class="empty">None saved yet.</span>'; return; }
    state.starts.forEach(s=>{
      const chip = document.createElement('span'); chip.className='chip';
      chip.innerHTML = `<span class="nm">${s.name}</span><span class="x" title="Delete">✕</span>`;
      chip.querySelector('.nm').onclick = ()=>applyStart(s.lat, s.lon, s.name);
      chip.querySelector('.x').onclick = (e)=>{ e.stopPropagation(); deleteStart(s.name); };
      wrap.appendChild(chip);
    });
  }
  async function loadStarts(){
    try{ const r = await fetch('/api/starts'); if(r.ok){ state.starts = await r.json(); renderStarts(); } }
    catch(e){ /* non-fatal */ }
  }
  async function saveStart(){
    const inp = document.getElementById('startNameInput');
    const name = inp.value.trim() || state.startName;
    if(!name){ setStatus('Give this start a name first.', true); return; }
    try{
      const r = await fetch('/api/starts', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name, lat: state.start[0], lon: state.start[1] }) });
      if(!r.ok){ setStatus('Could not save start: '+(await r.text()), true); return; }
      state.starts = await r.json(); inp.value=''; renderStarts();
      setStatus(`Saved start "${name}".`);
    }catch(e){ setStatus('Save error: '+e.message, true); }
  }
  async function deleteStart(name){
    try{
      const r = await fetch('/api/starts/'+encodeURIComponent(name), { method:'DELETE' });
      if(r.ok){ state.starts = await r.json(); renderStarts(); }
    }catch(e){ /* non-fatal */ }
  }

  // ---- milestone: required waypoints ----
  function renderWaypoints(){
    const wrap = document.getElementById('msWaypoints'); wrap.innerHTML='';
    if(!state.waypoints.length){ wrap.innerHTML='<span class="empty">No waypoints yet.</span>'; return; }
    state.waypoints.forEach((w,i)=>{
      const chip = document.createElement('span'); chip.className='chip';
      chip.innerHTML = `<span class="nm">📍 ${w.label||('Point '+(i+1))}</span><span class="x" title="Remove">✕</span>`;
      chip.querySelector('.x').onclick = (e)=>{ e.stopPropagation(); removeWaypoint(i); };
      wrap.appendChild(chip);
    });
  }
  function drawWpMarkers(){
    state.wpMarkers.forEach(m=>map.removeLayer(m)); state.wpMarkers=[];
    state.waypoints.forEach(w=>{ const m=L.marker([w[0],w[1]],{icon:WP_ICON}).addTo(map);
      state.wpMarkers.push(m); });
  }
  function drawSnapped(snapped){
    state.snapMarkers.forEach(m=>map.removeLayer(m)); state.snapMarkers=[];
    snapped.forEach(s=>{ if(s.moved){
      const m=L.marker(s.snapped,{icon:SNAP_ICON,title:`snapped ${s.moved_m} m to nearest runnable point`}).addTo(map);
      state.snapMarkers.push(m);
    }});
  }
  function addWaypoint(lat, lon, label){
    state.waypoints.push(Object.assign([lat,lon],{label}));
    renderWaypoints(); drawWpMarkers();
  }
  function removeWaypoint(i){ state.waypoints.splice(i,1); renderWaypoints(); drawWpMarkers(); }
  async function addWaypointByAddr(){
    const q=document.getElementById('msAddr').value.trim(); if(!q) return;
    setStatus('Looking up address…');
    try{
      const res=await fetch(`/api/geocode?q=${encodeURIComponent(q)}`);
      if(!res.ok){ setStatus('Address not found: '+(await res.text()), true); return; }
      const g=await res.json(); addWaypoint(g.lat,g.lon,g.display_name.split(',')[0]);
      document.getElementById('msAddr').value=''; setStatus(`Added waypoint "${g.display_name.split(',')[0]}".`);
    }catch(e){ setStatus('Geocoding error: '+e.message, true); }
  }

  // ---- saved milestones (server-side milestones.json) ----
  function renderMilestones(){
    const wrap=document.getElementById('msSaved'); wrap.innerHTML='';
    if(!state.milestones.length){ wrap.innerHTML='<span class="empty">None saved yet.</span>'; return; }
    state.milestones.forEach(m=>{
      const chip=document.createElement('span'); chip.className='chip';
      chip.innerHTML=`<span class="nm">${m.name}</span><span class="x" title="Delete">✕</span>`;
      chip.querySelector('.nm').onclick=()=>applyMilestone(m);
      chip.querySelector('.x').onclick=(e)=>{ e.stopPropagation(); deleteMilestone(m.name); };
      wrap.appendChild(chip);
    });
  }
  function applyMilestone(m){
    state.waypoints = m.waypoints.map((w,i)=>Object.assign([w.lat,w.lon],{label:`${m.name} ${i+1}`}));
    if(m.miles){ document.getElementById('miles').value=m.miles; state.miles=m.miles; }
    renderWaypoints(); drawWpMarkers(); generate();
  }
  async function loadMilestones(){
    try{ const r=await fetch('/api/milestones'); if(r.ok){ state.milestones=await r.json(); renderMilestones(); } }
    catch(e){}
  }
  async function saveMilestone(){
    if(!state.waypoints.length){ setStatus('Add waypoints before saving.', true); return; }
    const name=document.getElementById('msNameInput').value.trim();
    if(!name){ setStatus('Name this milestone first.', true); return; }
    try{
      const r=await fetch('/api/milestones',{ method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ name, waypoints: state.waypoints.map(w=>({lat:w[0],lon:w[1]})),
          miles: parseFloat(document.getElementById('miles').value) }) });
      if(!r.ok){ setStatus('Could not save: '+(await r.text()), true); return; }
      state.milestones=await r.json(); document.getElementById('msNameInput').value='';
      renderMilestones(); setStatus(`Saved milestone "${name}".`);
    }catch(e){ setStatus('Save error: '+e.message, true); }
  }
  async function deleteMilestone(name){
    try{ const r=await fetch('/api/milestones/'+encodeURIComponent(name),{method:'DELETE'});
      if(r.ok){ state.milestones=await r.json(); renderMilestones(); } }catch(e){}
  }

  // ---- mode switching ----
  function setMode(mode){
    state.mode = mode;
    const ms = mode==='milestone';
    document.getElementById('msBlock').style.display = ms ? '' : 'none';
    document.getElementById('msSavedBlock').style.display = ms ? '' : 'none';
    document.getElementById('go').textContent = ms ? 'Build milestone loops' : 'Generate loops';
    document.getElementById('savedLabel').textContent = ms ? 'Saved starts (start point)' : 'Saved starts';
    document.querySelectorAll('#mode button').forEach(b=>b.classList.toggle('active', b.dataset.mode===mode));
    // clear snap markers when leaving milestone mode
    if(!ms){ state.snapMarkers.forEach(m=>map.removeLayer(m)); state.snapMarkers=[];
             state.wpMarkers.forEach(m=>map.removeLayer(m)); state.wpMarkers=[]; }
    else { drawWpMarkers(); renderWaypoints(); }
  }

  // Map click drops a waypoint in milestone mode.
  map.on('click', e=>{ if(state.mode==='milestone') addWaypoint(e.latlng.lat, e.latlng.lng); });

  // GPX + TCX download buttons injected into header
  const dl = document.createElement('a');
  dl.id='dlbtn'; dl.className='dl'; dl.href='#';
  dl.innerHTML='<button class="ghost">⬇ GPX</button>';
  document.querySelector('header .spacer').after(dl);

  const tcx = document.createElement('button');
  tcx.id='tcxbtn'; tcx.className='ghost';
  tcx.textContent='⌚ TCX';
  tcx.title='Course with turn cues for Apple Watch — import into WorkOutDoors / Footpath';
  tcx.onclick = downloadTcx;
  dl.after(tcx);

  // Directions panel show/hide toggle.
  document.getElementById('dirToggle').onclick = ()=>{
    const list = document.getElementById('dirlist');
    const shown = list.style.display!=='none';
    list.style.display = shown ? 'none' : 'block';
    document.getElementById('dirToggle').textContent = shown ? 'show' : 'hide';
  };

  document.getElementById('go').onclick = generate;
  document.getElementById('setStart').onclick = setStart;
  document.getElementById('useHome').onclick = useHome;
  document.getElementById('saveStart').onclick = saveStart;
  document.getElementById('addr').addEventListener('keydown', e=>{ if(e.key==='Enter') setStart(); });
  document.getElementById('miles').addEventListener('keydown', e=>{ if(e.key==='Enter') generate(); });
  document.getElementById('startNameInput').addEventListener('keydown', e=>{ if(e.key==='Enter') saveStart(); });
  document.querySelectorAll('#presets button').forEach(b=>{
    b.onclick = ()=>{ document.querySelectorAll('#presets button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); document.getElementById('miles').value=b.dataset.mi; generate(); };
  });
  document.querySelectorAll('#surface button').forEach(b=>{
    b.onclick = ()=>{ document.querySelectorAll('#surface button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); state.surface=b.dataset.surf; generate(); };
  });

  // milestone wiring
  document.querySelectorAll('#mode button').forEach(b=>{ b.onclick = ()=>setMode(b.dataset.mode); });
  document.querySelectorAll('#msPad button').forEach(b=>{
    b.onclick = ()=>{ document.querySelectorAll('#msPad button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); state.pad = b.dataset.pad==='1'; generate(); };
  });
  document.querySelectorAll('#msShape button').forEach(b=>{
    b.onclick = ()=>{ document.querySelectorAll('#msShape button').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); state.outBack = b.dataset.ob==='1'; generate(); };
  });
  document.getElementById('msAddAddr').onclick = addWaypointByAddr;
  document.getElementById('msAddr').addEventListener('keydown', e=>{ if(e.key==='Enter') addWaypointByAddr(); });
  document.getElementById('msSave').onclick = saveMilestone;
  document.getElementById('msNameInput').addEventListener('keydown', e=>{ if(e.key==='Enter') saveMilestone(); });

  // boot
  document.getElementById('startName').textContent='📍 Home (Carlisle, PA)';
  loadStarts();
  loadMilestones();
  generateLoops();
  </script>
</body>
</html>
